<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 470" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" role="img" aria-label="The cover rule, blank beats wrong: Earditor tags an uploader's cover with the uploader as artist, a blank or 'Covers' album, and the file's own thumbnail; conventional taggers wrongly borrow the original release's official album and artwork, making the cover masquerade as the original. All data shown is synthetic.">
  <style>
    :root{
      --bg:#fbf8f5;--panel:#ffffff;--panel2:#f5ede6;--line:#e6dcd2;--line2:#d8ccc0;
      --ink:#2b211c;--sub:#7a6a5e;--mut:#9a8a7c;
      --rose:#b8546c;--green:#3f9068;--greenw:#e5f1ea;--greenl:#b8ddc9;
      --red:#c04f3c;--redw:#f6e2dc;--redl:#e6b9ad;
    }
    @media (prefers-color-scheme: dark){
      :root{
        --bg:#17130f;--panel:#221c17;--panel2:#2c241e;--line:#3a2f27;--line2:#4a3d33;
        --ink:#f0e9e2;--sub:#b3a498;--mut:#8f8278;
        --rose:#dd8299;--green:#6bbf95;--greenw:#183226;--greenl:#2f5a44;
        --red:#e2735f;--redw:#3a201a;--redl:#6b382c;
      }
    }
    .bg{fill:var(--bg);} .ink{fill:var(--ink);} .sub{fill:var(--sub);} .mut{fill:var(--mut);}
    .h{font-family:Georgia,'Times New Roman',serif;fill:var(--ink);}
    .mono{font-family:ui-monospace,'SF Mono',Menlo,monospace;}
    .tag{font-family:ui-monospace,Menlo,monospace;font-size:9px;letter-spacing:.06em;}
  </style>
  <defs>
    <linearGradient id="thumb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8a93b8"/><stop offset="1" stop-color="#5b6b8f"/>
    </linearGradient>
    <linearGradient id="official" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d98098"/><stop offset="1" stop-color="#8f3f68"/>
    </linearGradient>
  </defs>
  <rect class="bg" x="0" y="0" width="1060" height="470" rx="20"/>
  <text class="h" x="40" y="54" font-size="27" font-style="italic" font-weight="600">The cover rule: <tspan fill="var(--rose)">blank beats wrong</tspan></text>
  <text class="sub" x="40" y="80" font-size="14.5">The same file — an uploader's cover of “Runaway Sunday”. What should the tagger write?</text>

  <!-- ===== LEFT: Earditor (right) ===== -->
  <rect x="40" y="108" width="470" height="300" rx="18" fill="var(--panel)" stroke="var(--greenl)" stroke-width="1.6"/>
  <circle cx="72" cy="140" r="12" fill="var(--green)"/>
  <path d="M66 140 l4 4 l8 -9" stroke="#fff" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text class="h" x="92" y="145" font-size="17" font-weight="600">Earditor</text>
  <text class="mono" x="470" y="145" text-anchor="end" font-size="10.5" fill="var(--green)">CORRECT</text>

  <!-- art: uploader's own thumbnail -->
  <rect x="72" y="176" width="120" height="120" rx="14" fill="url(#thumb)"/>
  <text x="132" y="232" font-size="42" text-anchor="middle" fill="rgba(255,255,255,.9)" font-family="Georgia,serif">♪</text>
  <rect x="80" y="266" width="104" height="18" rx="9" fill="rgba(0,0,0,.38)"/>
  <text class="tag" x="132" y="279" text-anchor="middle" fill="#fff" font-size="8.5">OWN THUMBNAIL</text>

  <g font-size="13.5">
    <text class="mono mut" x="220" y="196" font-size="10">TITLE</text><text class="ink" x="300" y="196">Runaway Sunday</text>
    <text class="mono mut" x="220" y="224" font-size="10">ARTIST</text><text class="ink" x="300" y="224" font-weight="600">Jesse Cormac</text>
    <text class="mut" x="300" y="240" font-size="10.5">the uploader who performed it</text>
    <text class="mono mut" x="220" y="268" font-size="10">ALBUM</text><text class="sub" x="300" y="268" font-style="italic">— Jesse Cormac (Covers)</text>
    <text class="mono mut" x="220" y="296" font-size="10">ART</text><text class="sub" x="300" y="296" font-style="italic">— keeps its own</text>
  </g>
  <rect x="72" y="330" width="406" height="56" rx="12" fill="var(--greenw)" stroke="var(--greenl)"/>
  <text class="ink" x="90" y="354" font-size="12.5" font-weight="600">A cover is its own recording.</text>
  <text class="sub" x="90" y="374" font-size="12">No album is invented, no artwork borrowed — nothing it can't justify.</text>

  <!-- ===== RIGHT: conventional taggers (wrong) ===== -->
  <rect x="550" y="108" width="470" height="300" rx="18" fill="var(--panel)" stroke="var(--redl)" stroke-width="1.6"/>
  <circle cx="582" cy="140" r="12" fill="var(--red)"/>
  <path d="M577 135 l10 10 M587 135 l-10 10" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/>
  <text class="h" x="602" y="145" font-size="17" font-weight="600">Conventional taggers</text>
  <text class="mono" x="980" y="145" text-anchor="end" font-size="10.5" fill="var(--red)">WRONG</text>

  <!-- art: borrowed official cover, crossed out -->
  <rect x="582" y="176" width="120" height="120" rx="14" fill="url(#official)"/>
  <text x="642" y="232" font-size="30" text-anchor="middle" fill="rgba(255,255,255,.95)" font-family="Georgia,serif" font-style="italic">M</text>
  <rect x="588" y="266" width="108" height="18" rx="9" fill="rgba(0,0,0,.38)"/>
  <text class="tag" x="642" y="279" text-anchor="middle" fill="#fff" font-size="8.5">OFFICIAL ART</text>
  <!-- red slash over the borrowed art -->
  <line x1="582" y1="296" x2="702" y2="176" stroke="var(--red)" stroke-width="4" stroke-linecap="round"/>

  <g font-size="13.5">
    <text class="mono mut" x="730" y="196" font-size="10">TITLE</text><text class="ink" x="810" y="196">Runaway Sunday</text>
    <text class="mono mut" x="730" y="224" font-size="10">ARTIST</text><text class="ink" x="810" y="224" font-weight="600">Jesse Cormac</text>
    <text class="mono mut" x="730" y="268" font-size="10">ALBUM</text><text class="ink" x="810" y="268" fill="var(--red)">Midnight Radio</text>
    <text class="mut" x="810" y="284" font-size="10.5">the original release's album</text>
    <text class="mono mut" x="730" y="296" font-size="10">ART</text><text class="ink" x="810" y="296" fill="var(--red)">borrowed official cover</text>
  </g>
  <rect x="582" y="330" width="406" height="56" rx="12" fill="var(--redw)" stroke="var(--redl)"/>
  <text class="ink" x="600" y="354" font-size="12.5" font-weight="600">Now the cover masquerades as the original.</text>
  <text class="sub" x="600" y="374" font-size="12">Borrowed album + art the uploader never released — confidently wrong.</text>

  <text class="mut" x="40" y="440" font-size="11.5" font-style="italic">All data shown is synthetic.</text>
</svg>
