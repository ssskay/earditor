name: Build Windows app

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

env:
  # Chromaprint's official fpcalc release. Its LGPL/BSD terms permit redistribution,
  # which is what lets the app ship it instead of asking users to hunt for a binary.
  CHROMAPRINT_VERSION: "1.5.1"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Vendor fpcalc.exe
        shell: pwsh
        run: |
          $v = $env:CHROMAPRINT_VERSION
          $url = "https://github.com/acoustid/chromaprint/releases/download/v$v/chromaprint-fpcalc-$v-windows-x86_64.zip"
          Invoke-WebRequest -Uri $url -OutFile fpcalc.zip
          Expand-Archive fpcalc.zip -DestinationPath fpcalc-tmp
          New-Item -ItemType Directory -Force -Path packaging/vendor | Out-Null
          Copy-Item (Get-ChildItem -Recurse -Filter fpcalc.exe fpcalc-tmp)[0].FullName packaging/vendor/fpcalc.exe
          packaging/vendor/fpcalc.exe -version

      - run: python -m pip install -r requirements.txt -r packaging/requirements-app.txt pyinstaller pytest
      - run: python -m pytest -q

      - run: pyinstaller packaging/setup_win.spec --noconfirm

      # The classic PyInstaller failure is a frozen-only import error, which a
      # green test suite will never catch. Launch the real exe before shipping it.
      - name: Smoke-test the frozen exe
        shell: pwsh
        run: |
          $exe = "dist/Earditor/Earditor.exe"
          if (-not (Test-Path $exe)) { throw "build produced no exe" }
          $p = Start-Process $exe -ArgumentList "--demo" -PassThru
          # Require an HTTP answer — a live PID is not proof of life (a crash
          # dialog or lingering window keeps a dead app's process running).
          $ok = $false
          foreach ($i in 1..30) {
            Start-Sleep -Seconds 2
            try {
              $r = Invoke-WebRequest -Uri "http://127.0.0.1:5001/" -UseBasicParsing -TimeoutSec 2
              if ($r.Content -match "(?i)earditor") { $ok = $true; break }
            } catch {}
          }
          Stop-Process -Id $p.Id -Force -ErrorAction SilentlyContinue
          if (-not $ok) { throw "exe never answered on :5001 — launch crash or frozen import error" }
          Write-Host "exe serves the review UI"

      - name: Zip
        shell: pwsh
        run: Compress-Archive -Path dist/Earditor/* -DestinationPath Earditor-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: Earditor-windows
          path: Earditor-windows.zip
          if-no-files-found: error
