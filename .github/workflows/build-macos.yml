name: Build macOS app

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      # Vendor fpcalc into the bundle so users don't need Homebrew. Chromaprint's
      # terms permit redistribution. Use the official release binary (statically
      # linked, universal) — the brew binary dynamically links libchromaprint.dylib
      # and dies when copied out of its cellar. Same version the Windows build pins.
      - name: Vendor fpcalc
        env:
          CHROMAPRINT_VERSION: "1.5.1"
        run: |
          curl -fsSL -o fpcalc.tar.gz "https://github.com/acoustid/chromaprint/releases/download/v${CHROMAPRINT_VERSION}/chromaprint-fpcalc-${CHROMAPRINT_VERSION}-macos-universal.tar.gz"
          tar -xzf fpcalc.tar.gz
          mkdir -p packaging/vendor
          cp "chromaprint-fpcalc-${CHROMAPRINT_VERSION}-macos-universal/fpcalc" packaging/vendor/fpcalc
          chmod +x packaging/vendor/fpcalc
          packaging/vendor/fpcalc -version

      - run: python -m pip install -r requirements.txt -r packaging/requirements-app.txt pytest
      - run: python -m pytest -q
      - run: python packaging/setup_app.py py2app

      # A green test suite never catches a frozen-only import error. Launch it and
      # require an HTTP answer: a live PID is NOT proof of life — py2app's crash
      # dialog keeps a dead app's process running, which masked a real launch crash.
      - name: Smoke-test the frozen app
        run: |
          dist/Earditor.app/Contents/MacOS/Earditor --demo &
          PID=$!
          for i in $(seq 1 30); do
            sleep 2
            if curl -sf http://127.0.0.1:5001/ | grep -qi earditor; then
              echo "app serves the review UI"; kill "$PID"; exit 0
            fi
          done
          echo "app never answered on :5001 — launch crash or frozen import error"
          kill "$PID" 2>/dev/null; exit 1
      - run: ditto -c -k --keepParent dist/Earditor.app Earditor-unsigned-macOS.zip
      - uses: actions/upload-artifact@v4
        with:
          name: Earditor-unsigned-macOS
          path: Earditor-unsigned-macOS.zip
          if-no-files-found: error
